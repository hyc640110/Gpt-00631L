<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>00631L Pro Web App v3.1</title>
<style>
:root{
  --bg:#07101d;--panel:#111c2b;--panel2:#162235;--line:rgba(255,255,255,.10);
  --text:#e8eef7;--muted:#8ca0b3;--blue:#4fc3f7;--purple:#ce93d8;--green:#a5d6a7;
  --yellow:#ffd54f;--orange:#ffb74d;--red:#ef9a9a;--indigo:#7e8cff
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,#050b15,#07101d 42%,#050b15);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:16px 12px 42px;min-height:100vh}
.app{max-width:720px;margin:0 auto}
h1{text-align:center;font-size:23px;font-weight:900;letter-spacing:.5px;margin:4px 0 2px}
.sub{text-align:center;color:var(--muted);font-size:12px;margin-bottom:14px}
.card{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 8px 28px rgba(0,0,0,.12)}
.card-title{font-size:14px;font-weight:850;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.small{font-size:11px;color:var(--muted);line-height:1.45}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.kpi{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px}
.kpi .label{font-size:10px;color:var(--muted);margin-bottom:4px}
.kpi .value{font-size:22px;font-weight:900}
.kpi .hint{font-size:10px;color:var(--muted);margin-top:3px}
input{width:100%;background:#172435;border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:9px 10px;color:#fff;font-size:16px;font-weight:800;outline:none}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px}
.row{display:flex;gap:8px;align-items:center}
.btn{border:0;border-radius:999px;padding:10px 14px;font-size:13px;font-weight:850;cursor:pointer;color:#07101d;background:var(--blue)}
.btn.secondary{background:#223247;color:var(--text);border:1px solid rgba(255,255,255,.12)}
.btn.purple{background:var(--purple)}
.iconbtn{width:46px;height:42px;border-radius:14px;border:1px solid rgba(79,195,247,.35);background:rgba(79,195,247,.14);color:#d8f4ff;font-size:19px;font-weight:900}
.asset-card{display:grid;grid-template-columns:1.1fr .9fr auto;gap:8px;align-items:end;padding:12px;border-radius:16px;background:rgba(79,195,247,.055);border:1px solid rgba(79,195,247,.18);margin-bottom:9px}
.asset-card:nth-child(2){background:rgba(126,140,255,.055);border-color:rgba(126,140,255,.18)}
.asset-card:nth-child(3){background:rgba(165,214,167,.055);border-color:rgba(165,214,167,.18)}
.asset-name{font-size:15px;font-weight:900;margin-bottom:7px}
.status{font-size:10px;margin-left:4px;color:var(--green)}
.status.fail{color:var(--red)}
.price-meta{font-size:10px;color:var(--muted);margin-top:5px}
.bar{height:18px;border-radius:999px;overflow:hidden;display:flex;background:rgba(255,255,255,.06);margin:8px 0}
.bar div{min-width:1px}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px}
details{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:0;margin-bottom:10px}
summary{list-style:none;padding:13px 14px;font-size:14px;font-weight:850;cursor:pointer;display:flex;justify-content:space-between}
summary::-webkit-details-marker{display:none}
details .inside{padding:0 14px 14px}
.slider{width:100%;accent-color:var(--blue)}
.pill{display:inline-flex;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:850;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
canvas{display:block;width:100%;height:260px;border-radius:12px;background:rgba(255,255,255,.02)}
.footer{text-align:center;color:#536475;font-size:10px;margin-top:10px}
.warn{background:rgba(255,183,77,.09);border:1px solid rgba(255,183,77,.25);border-radius:14px;padding:10px;color:#ffcc80;font-size:12px;line-height:1.45}
@media(max-width:560px){
  body{padding:14px 10px 34px}
  .grid3{grid-template-columns:1fr 1fr}
  .asset-card{grid-template-columns:1fr;gap:8px}
  .row.mobile-stack{align-items:stretch}
  h1{font-size:21px}
}
</style>
</head>
<body>
<div class="app">
<h1>四部位＋大跌加碼</h1>
<p class="sub">00631L Pro Web App v3.1｜手機優化版</p>

<section class="card">
  <div class="card-title">📌 資產總覽 <button class="btn secondary" onclick="refreshAll()">🔄 更新全部股價</button></div>
  <div class="grid2">
    <div class="kpi"><div class="label">真實總資產</div><div class="value" id="totalAssets">-</div><div class="hint" id="assetBreakdown">-</div></div>
    <div class="kpi"><div class="label">淨資產</div><div class="value" id="netAssets">-</div><div class="hint">總資產 - 借款</div></div>
    <div class="kpi"><div class="label">借款餘額</div><div class="value" id="loanView">-</div><div class="hint" id="loanHint">-</div></div>
    <div class="kpi"><div class="label">真實組合 Beta</div><div class="value" id="realBeta">-</div><div class="hint" id="riskHint">-</div></div>
  </div>
  <div class="warn" id="priceWarning" style="display:none;margin-top:10px"></div>
</section>

<section class="card">
  <div class="card-title">📊 持股摘要 <span class="pill" id="lastUpdate">尚未更新</span></div>
  <div id="assets"></div>
  <label>現金（萬元）</label>
  <input type="number" id="cash" value="200" oninput="updateAndSync()">
  <div class="bar" id="realBar"></div>
  <div class="legend" id="realLegend"></div>
</section>

<section class="card">
  <div class="card-title">⚖️ 配置偏離與風險</div>
  <div class="grid3" id="driftCards"></div>
  <div style="height:10px"></div>
  <div class="grid3" id="lossCards"></div>
</section>

<section class="card">
  <div class="card-title">📈 十年資產模擬</div>
  <canvas id="chart"></canvas>
  <div class="grid3" id="resultCards" style="margin-top:10px"></div>
</section>

<details>
<summary>☁️ 雲端設定 <span id="cloudStatus" class="pill">未連線</span></summary>
<div class="inside">
  <div class="grid2">
    <div><label>Firebase 資料庫網址</label><input type="text" id="fbUrl" placeholder="https://xxx.firebaseio.com/" onblur="saveSyncConfig()"></div>
    <div><label>自訂個人密鑰</label><input type="password" id="fbKey" placeholder="任意密碼" onblur="saveSyncConfig()"></div>
  </div>
  <button class="btn purple" style="margin-top:10px;width:100%" onclick="loadFromCloud()">連線同步</button>
  <p class="small" id="storageMsg" style="margin-top:8px">平常可收合此區，資料會自動同步。</p>
</div>
</details>

<details>
<summary>🏦 借款設定 <span class="pill" id="loanSummaryPill">-</span></summary>
<div class="inside grid2">
  <div><label>借款金額（萬元）</label><input type="number" id="loanAmount" value="155" oninput="updateAndSync()"></div>
  <div><label>年利率（%）</label><input type="number" step="0.01" id="loanRate" value="4.23" oninput="updateAndSync()"></div>
  <div><label>貸款開始日期</label><input type="text" id="loanStart" value="2026-06" oninput="updateAndSync()"></div>
  <div><label>貸款總期數（月）</label><input type="number" id="loanTotalMonths" value="60" oninput="updateAndSync()"></div>
</div>
</details>

<details>
<summary>📉 大跌加碼設定 <span class="pill" id="addPill">啟用</span></summary>
<div class="inside">
  <div class="grid2">
    <div><label>加碼金額（萬元）</label><input type="number" id="addOnAmt" value="50" oninput="updateAndSync()"></div>
    <div><label>觸發跌幅（%）</label><input type="number" id="addOnDrop" value="25" oninput="updateAndSync()"></div>
    <div><label>發生第幾年</label><input type="number" id="addOnYear" value="2" oninput="updateAndSync()"></div>
    <div><label>資金來源</label><button class="btn secondary" style="width:100%" onclick="toggleSource()" id="sourceBtn">防禦現金扣除</button></div>
  </div>
  <button class="btn secondary" style="margin-top:10px;width:100%" onclick="toggleAddOn()" id="addBtn">關閉加碼</button>
</div>
</details>

<details>
<summary>📐 模擬參數 <span class="pill">年化 / 目標配置</span></summary>
<div class="inside grid2">
  <div><label>00631L 年化 %</label><input type="number" id="rate631" value="14" oninput="updateAndSync()"></div>
  <div><label>0050 年化 %</label><input type="number" id="rate50" value="9" oninput="updateAndSync()"></div>
  <div><label>00865B 年化 %</label><input type="number" id="rateBond" value="4.5" oninput="updateAndSync()"></div>
  <div><label>00631L 目標 %</label><input type="number" id="pct631" value="40" oninput="updateAndSync()"></div>
  <div><label>0050 目標 %</label><input type="number" id="pct50" value="20" oninput="updateAndSync()"></div>
  <div><label>00865B 目標 %</label><input type="number" id="pctBond" value="20" oninput="updateAndSync()"></div>
</div>
</details>

<p class="footer">投資模擬僅供自我管理與情境試算，不代表投資建議。</p>
</div>

<script>
const CONF_KEY='portfolio-sync-conf-v31';
const STATE_KEY='portfolio-state-v31';
let isCloudSyncing=false, syncTimer=null;
let addOnEnabled=true, addOnSource='cash';
let prices={p631:40.2,p50:150,pBond:48.15};
let quoteStatus={p631:'尚未更新',p50:'尚未更新',pBond:'尚未更新'};
const color={p631:'#4fc3f7',p50:'#7e8cff',pBond:'#a5d6a7',cash:'#ffd54f'};
const tickers=[
  {key:'p631',name:'00631L',shares:'shares631',price:'price631',twse:'00631L.TW',beta:1.9,target:'pct631'},
  {key:'p50',name:'0050',shares:'shares50',price:'price50',twse:'0050.TW',beta:1.0,target:'pct50'},
  {key:'pBond',name:'00865B',shares:'sharesBond',price:'priceBond',twse:'00865B.TW',beta:0.05,target:'pctBond'}
];

function g(id){return document.getElementById(id)}
function num(id){return parseFloat(g(id).value)||0}
function fmt(v){const a=Math.abs(v); if(a>=1e8)return (v/1e8).toFixed(2)+'億'; if(a>=1e7)return (v/1e7).toFixed(2)+'千萬'; if(a>=1e6)return (v/1e6).toFixed(2)+'百萬'; return (v/1e4).toFixed(1)+'萬'}
function money(v){return Math.round(v).toLocaleString('zh-TW')}
function safeSet(k,v){try{localStorage.setItem(k,v);return true}catch(e){return false}}
function normalizeUrl(u){u=(u||'').trim(); if(u&&!u.endsWith('/'))u+='/'; return u}
async function hashKey(s){const data=new TextEncoder().encode(s); const hash=await crypto.subtle.digest('SHA-256',data); return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32)}

function ensureAssetInputs(){
  const wrap=g('assets'); wrap.innerHTML='';
  tickers.forEach(t=>{
    const div=document.createElement('div'); div.className='asset-card';
    div.innerHTML=`
      <div><div class="asset-name" style="color:${color[t.key]}">${t.name}</div><label>持股數</label><input type="number" id="${t.shares}" value="${t.key==='p631'?72000:(t.key==='p50'?5000:9000)}" oninput="updateAndSync()"></div>
      <div><label>股價 <span id="${t.key}Status" class="status">${quoteStatus[t.key]}</span></label><input type="number" step="0.01" id="${t.price}" value="${prices[t.key]}" oninput="manualPrice('${t.key}','${t.price}')"><div class="price-meta">市值 <span id="${t.key}Value">-</span></div></div>
      <button class="iconbtn" onclick="refreshOne('${t.key}')">↻</button>`;
    wrap.appendChild(div);
  });
}
function manualPrice(k,id){const v=parseFloat(g(id).value); if(v>0)prices[k]=v; updateAndSync()}

async function fetchYahoo(ticker){
  const urls=[
    `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}`
  ];
  for(const url of urls){
    try{
      const r=await fetch(url,{cache:'no-store'});
      if(!r.ok) continue;
      const j=await r.json();
      const p=j?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if(p && isFinite(p)) return p;
    }catch(e){}
  }
  throw new Error('quote failed');
}
async function refreshOne(key){
  const t=tickers.find(x=>x.key===key);
  quoteStatus[key]='更新中'; renderStatus();
  try{
    const p=await fetchYahoo(t.twse);
    prices[key]=p; g(t.price).value=p;
    quoteStatus[key]='已更新 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  }catch(e){quoteStatus[key]='更新失敗'}
  updateAndSync();
}
async function refreshAll(){
  await Promise.allSettled(tickers.map(t=>refreshOne(t.key)));
}

function renderStatus(){
  tickers.forEach(t=>{
    const el=g(t.key+'Status'); if(!el)return;
    el.textContent=quoteStatus[t.key]; el.className='status'+(quoteStatus[t.key].includes('失敗')?' fail':'');
  });
}
function update(){
  renderStatus();
  let vals={}, totalStock=0, beta=0;
  tickers.forEach(t=>{
    const s=num(t.shares), p=prices[t.key];
    vals[t.key]=s*p; totalStock+=vals[t.key];
    const el=g(t.key+'Value'); if(el)el.textContent=fmt(vals[t.key]);
  });
  const cash=num('cash')*10000, loan=num('loanAmount')*10000;
  const total=totalStock+cash, net=total-loan;
  tickers.forEach(t=>{if(total>0)beta+=vals[t.key]/total*t.beta});
  g('totalAssets').textContent=fmt(total);
  g('netAssets').textContent=fmt(net);
  g('loanView').textContent=fmt(loan);
  g('loanHint').textContent=`利率 ${num('loanRate')}%｜${num('loanTotalMonths')} 期`;
  g('loanSummaryPill').textContent=`${fmt(loan)}｜${num('loanRate')}%`;
  g('assetBreakdown').textContent=`631L ${fmt(vals.p631)} + 0050 ${fmt(vals.p50)} + 865B ${fmt(vals.pBond)} + 現金 ${fmt(cash)}`;
  g('realBeta').textContent=beta.toFixed(2);
  g('riskHint').textContent=beta>1.4?'積極型':beta>0.8?'穩健型':'保守型';
  const fails=tickers.filter(t=>quoteStatus[t.key].includes('失敗')).map(t=>t.name);
  g('priceWarning').style.display=fails.length?'block':'none';
  g('priceWarning').textContent=fails.length?`⚠️ ${fails.join('、')} 股價更新失敗，已使用目前手動價格。`:''; 
  const last=Object.values(quoteStatus).filter(s=>s.includes('已更新')).pop();
  g('lastUpdate').textContent=last||'可手動更新';
  renderBar(vals,cash,total);
  renderDrift(vals,cash,total);
  renderLoss(vals,total);
  const data=makeChartData(total);
  drawChart(data,total);
  renderResults(data,total);
  g('addPill').textContent=addOnEnabled?'啟用':'關閉';
  g('addBtn').textContent=addOnEnabled?'關閉加碼':'啟用加碼';
  g('sourceBtn').textContent=addOnSource==='cash'?'防禦現金扣除':'額外新增資金';
}
function renderBar(vals,cash,total){
  const bar=g('realBar'); bar.innerHTML='';
  const arr=[['00631L',vals.p631,color.p631],['0050',vals.p50,color.p50],['00865B',vals.pBond,color.pBond],['現金',cash,color.cash]];
  arr.forEach(x=>{const d=document.createElement('div'); d.style.flex=total?x[1]/total*100:0; d.style.background=x[2]; bar.appendChild(d)});
  g('realLegend').innerHTML=arr.map(x=>`<span><i class="dot" style="background:${x[2]}"></i>${x[0]} ${total?(x[1]/total*100).toFixed(1):0}%</span>`).join('');
}
function renderDrift(vals,cash,total){
  const targetCash=Math.max(0,100-num('pct631')-num('pct50')-num('pctBond'));
  const rows=[
    ['00631L', vals.p631, num('pct631'), color.p631],
    ['0050', vals.p50, num('pct50'), color.p50],
    ['00865B', vals.pBond, num('pctBond'), color.pBond],
    ['現金', cash, targetCash, color.cash]
  ];
  g('driftCards').innerHTML=rows.map(r=>{
    const now=total?r[1]/total*100:0, diff=now-r[2];
    return `<div class="kpi"><div class="label">${r[0]}</div><div class="value" style="font-size:18px;color:${r[3]}">${diff>=0?'+':''}${diff.toFixed(1)}%</div><div class="hint">目前 ${now.toFixed(1)}%｜目標 ${r[2]}%</div></div>`
  }).join('');
}
function renderLoss(vals,total){
  g('lossCards').innerHTML=[20,30,50].map(d=>{
    const loss=vals.p631*d/100*1.9+vals.p50*d/100+vals.pBond*d/100*.05;
    return `<div class="kpi"><div class="label">大盤跌 -${d}%</div><div class="value" style="font-size:18px;color:var(--red)">-${fmt(loss)}</div><div class="hint">約 -${total?(loss/total*100).toFixed(1):0}%</div></div>`
  }).join('');
}
function makeChartData(total){
  const pct631=num('pct631'), pct50=num('pct50'), pctBond=num('pctBond'), pctCash=Math.max(0,100-pct631-pct50-pctBond);
  const init={p631:total*pct631/100,p50:total*pct50/100,pBond:total*pctBond/100,cash:total*pctCash/100};
  const r631=num('rate631')/100,r50=num('rate50')/100,rBond=num('rateBond')/100;
  const amt=num('addOnAmt')*10000, year=num('addOnYear');
  const data=[];
  for(let i=0;i<=10;i++){
    let v631=init.p631*Math.pow(1+r631,i), v50=init.p50*Math.pow(1+r50,i), vBond=init.pBond*Math.pow(1+rBond,i), vCash=init.cash;
    let vAdd=0;
    if(addOnEnabled && i>=year){vAdd=amt*Math.pow(1+r631,i-year); if(addOnSource==='cash')vCash=Math.max(0,init.cash-amt)}
    data.push({year:i,p631:v631,p50:v50,pBond:vBond,cash:vCash,add:vAdd,total:v631+v50+vBond+vCash+vAdd,base:v631+v50+vBond+init.cash});
  }
  return data;
}
function drawChart(data,cost){
  const canvas=g('chart'), dpr=window.devicePixelRatio||1, W=canvas.clientWidth, H=260;
  canvas.width=W*dpr; canvas.height=H*dpr; const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H); const pad={l:58,r:10,t:16,b:28}, cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const max=Math.max(...data.map(d=>d.total))*1.08||1;
  const x=i=>pad.l+i*cw/10, y=v=>pad.t+ch*(1-v/max);
  ctx.strokeStyle='rgba(255,255,255,.10)'; ctx.fillStyle='#8ca0b3'; ctx.font='10px -apple-system';
  for(let i=0;i<=4;i++){const yy=pad.t+i*ch/4, val=max*(1-i/4); ctx.beginPath(); ctx.moveTo(pad.l,yy); ctx.lineTo(W-pad.r,yy); ctx.stroke(); ctx.textAlign='right'; ctx.fillText(fmt(val),pad.l-7,yy+3)}
  const layers=[['cash',color.cash],['pBond',color.pBond],['p50',color.p50],['add','#ff9800'],['p631',color.p631]];
  let bottoms=data.map(_=>0);
  layers.forEach(([k,c])=>{
    ctx.beginPath();
    data.forEach((d,i)=>{const top=bottoms[i]+d[k]; i?ctx.lineTo(x(i),y(top)):ctx.moveTo(x(i),y(top))});
    for(let i=data.length-1;i>=0;i--)ctx.lineTo(x(i),y(bottoms[i]));
    ctx.closePath(); ctx.fillStyle=c+'55'; ctx.fill();
    bottoms=bottoms.map((b,i)=>b+data[i][k]);
  });
  ctx.strokeStyle='rgba(239,154,154,.9)'; ctx.setLineDash([6,5]); ctx.beginPath(); ctx.moveTo(x(0),y(cost)); ctx.lineTo(x(10),y(cost)); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#8ca0b3'; ctx.textAlign='center'; for(let i=0;i<=10;i+=2)ctx.fillText(i+'年',x(i),H-8);
}
function renderResults(data,cost){
  const five=data[5].total, ten=data[10].total, cagr=Math.pow(ten/cost,1/10)-1;
  g('resultCards').innerHTML=[
    ['五年後',fmt(five),'+'+fmt(five-cost),'#4fc3f7'],
    ['十年後',fmt(ten),'+'+fmt(ten-cost),'#ce93d8'],
    ['CAGR',isFinite(cagr)?(cagr*100).toFixed(1)+'%':'-','年化估算','#a5d6a7']
  ].map(x=>`<div class="kpi"><div class="label">${x[0]}</div><div class="value" style="font-size:18px;color:${x[3]}">${x[1]}</div><div class="hint">${x[2]}</div></div>`).join('');
}
function getSettings(){
  return {prices,quoteStatus,addOnEnabled,addOnSource,
    shares631:num('shares631'),shares50:num('shares50'),sharesBond:num('sharesBond'),cash:num('cash'),
    loanAmount:num('loanAmount'),loanRate:num('loanRate'),loanStart:g('loanStart').value,loanTotalMonths:num('loanTotalMonths'),
    addOnAmt:num('addOnAmt'),addOnDrop:num('addOnDrop'),addOnYear:num('addOnYear'),
    rate631:num('rate631'),rate50:num('rate50'),rateBond:num('rateBond'),pct631:num('pct631'),pct50:num('pct50'),pctBond:num('pctBond')};
}
function applySettings(s){
  if(!s)return; isCloudSyncing=true;
  if(s.prices) prices={...prices,...s.prices}; if(s.quoteStatus) quoteStatus={...quoteStatus,...s.quoteStatus};
  ['shares631','shares50','sharesBond','cash','loanAmount','loanRate','loanStart','loanTotalMonths','addOnAmt','addOnDrop','addOnYear','rate631','rate50','rateBond','pct631','pct50','pctBond'].forEach(id=>{if(s[id]!=null&&g(id))g(id).value=s[id]});
  if(s.addOnEnabled!=null)addOnEnabled=s.addOnEnabled; if(s.addOnSource)addOnSource=s.addOnSource;
  tickers.forEach(t=>{if(g(t.price))g(t.price).value=prices[t.key]});
  isCloudSyncing=false; update();
}
function saveSyncConfig(){
  const conf={url:normalizeUrl(g('fbUrl').value),key:g('fbKey').value.trim()};
  g('fbUrl').value=conf.url; safeSet(CONF_KEY,JSON.stringify(conf));
}
async function syncToCloud(){
  if(isCloudSyncing)return; const conf=JSON.parse(localStorage.getItem(CONF_KEY)||'{}'); if(!conf.url||!conf.key)return;
  try{
    const path=await hashKey(conf.key); g('cloudStatus').textContent='同步中';
    await fetch(normalizeUrl(conf.url)+path+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(getSettings())});
    g('cloudStatus').textContent='✅ 已同步';
  }catch(e){g('cloudStatus').textContent='❌ 同步失敗'}
}
function updateAndSync(){update(); safeSet(STATE_KEY,JSON.stringify(getSettings())); clearTimeout(syncTimer); syncTimer=setTimeout(syncToCloud,900)}
async function loadFromCloud(){
  saveSyncConfig(); const conf=JSON.parse(localStorage.getItem(CONF_KEY)||'{}'); if(!conf.url||!conf.key){alert('請輸入網址與密鑰');return}
  try{
    isCloudSyncing=true; g('cloudStatus').textContent='下載中';
    const path=await hashKey(conf.key); const r=await fetch(normalizeUrl(conf.url)+path+'.json');
    const data=await r.json(); isCloudSyncing=false; if(data)applySettings(data); else updateAndSync();
    g('cloudStatus').textContent='✅ 已連線';
  }catch(e){isCloudSyncing=false; g('cloudStatus').textContent='❌ 連線失敗'}
}
function toggleAddOn(){addOnEnabled=!addOnEnabled; updateAndSync()}
function toggleSource(){addOnSource=addOnSource==='cash'?'new':'cash'; updateAndSync()}
function init(){
  ensureAssetInputs();
  const conf=JSON.parse(localStorage.getItem(CONF_KEY)||'{}'); if(conf.url)g('fbUrl').value=conf.url; if(conf.key)g('fbKey').value=conf.key;
  try{const s=JSON.parse(localStorage.getItem(STATE_KEY)||'null'); if(s)applySettings(s)}catch(e){}
  update();
  if(conf.url&&conf.key)loadFromCloud();
  setTimeout(refreshAll,700);
}
window.addEventListener('resize',()=>update());
init();
</script>
