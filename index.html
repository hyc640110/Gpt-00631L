<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>00631L Pro Web App v4 Ultimate</title>
<style>
:root{
  --bg:#060b14;--bg2:#091425;--card:#111b2a;--card2:#162337;--line:rgba(255,255,255,.10);
  --text:#edf4ff;--muted:#8ca0b3;--blue:#4fc3f7;--cyan:#2de2e6;--purple:#ce93d8;
  --green:#91e7a7;--yellow:#ffd54f;--orange:#ffb74d;--red:#ff8a80;--indigo:#8ea0ff
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(circle at top,#11213a 0,#060b14 36%,#05070d 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:16px 12px 48px}
.app{max-width:760px;margin:0 auto}
h1{font-size:22px;font-weight:950;text-align:center;margin:2px 0 2px}
.sub{text-align:center;color:var(--muted);font-size:12px;margin-bottom:14px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.035));border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:12px;box-shadow:0 16px 40px rgba(0,0,0,.22)}
.title{font-size:15px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hero{text-align:center;padding:22px 16px 18px;background:linear-gradient(145deg,rgba(79,195,247,.18),rgba(206,147,216,.10),rgba(255,213,79,.06));border-color:rgba(79,195,247,.24)}
.hero .label{font-size:12px;color:#b8c7d8;font-weight:750}
.hero .main{font-size:46px;line-height:1.05;font-weight:1000;letter-spacing:-1px;margin:8px 0}
.hero .gain{display:inline-flex;gap:6px;align-items:center;border-radius:999px;padding:6px 12px;background:rgba(145,231,167,.13);color:var(--green);font-size:13px;font-weight:900}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.kpi{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:12px}
.kpi .label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:5px}
.kpi .value{font-size:24px;font-weight:1000;letter-spacing:-.3px}
.kpi .hint{font-size:11px;color:var(--muted);line-height:1.35;margin-top:4px}
.asset{display:grid;grid-template-columns:52px 1fr auto;gap:10px;align-items:center;padding:12px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);margin-bottom:9px}
.badge{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;font-size:14px;font-weight:1000;color:#06101c}
.asset .name{font-size:16px;font-weight:950}
.asset .meta{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.45}
.asset .amt{text-align:right;font-size:18px;font-weight:1000}
.asset .pct{text-align:right;font-size:11px;color:var(--muted);margin-top:3px}
.bar{height:18px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.06);display:flex;margin:10px 0}
.bar div{min-width:1px}
.legend{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px}
.btn{border:0;border-radius:999px;padding:10px 14px;background:linear-gradient(135deg,#4fc3f7,#8ea0ff);color:#06101c;font-size:13px;font-weight:950;cursor:pointer}
.btn.secondary{background:#1c2a3e;color:var(--text);border:1px solid rgba(255,255,255,.12)}
.iconbtn{width:46px;height:42px;border-radius:15px;border:1px solid rgba(79,195,247,.35);background:rgba(79,195,247,.13);color:#d9f7ff;font-size:18px;font-weight:1000}
input,select{width:100%;background:#172436;border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:10px 11px;color:#fff;font-size:16px;font-weight:850;outline:none}
label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:5px;display:block}
details{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:18px;margin-bottom:10px;overflow:hidden}
summary{list-style:none;padding:14px 15px;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:950;cursor:pointer}
summary::-webkit-details-marker{display:none}.inside{padding:0 15px 15px}
.pill{border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:4px 9px;font-size:11px;font-weight:900;color:#c7d6e8}
.warn{border-radius:18px;background:rgba(255,183,77,.10);border:1px solid rgba(255,183,77,.25);color:#ffcc80;padding:12px;font-size:13px;font-weight:750;line-height:1.5}
.ai{background:linear-gradient(145deg,rgba(145,231,167,.12),rgba(79,195,247,.09));border-color:rgba(145,231,167,.18)}
.ai p{font-size:14px;line-height:1.65;color:#dbe7f3}
canvas{display:block;width:100%;height:260px;border-radius:16px;background:rgba(255,255,255,.025)}
.status{font-size:11px;font-weight:800;color:var(--green)}.fail{color:var(--red)}
.footer{text-align:center;font-size:10px;color:#56697c;margin-top:12px}
@media(max-width:560px){
  body{padding:14px 10px 38px}.hero .main{font-size:42px}.grid3{grid-template-columns:1fr 1fr}.asset{grid-template-columns:46px 1fr auto}.badge{width:46px;height:46px;border-radius:16px}
}
</style>
</head>
<body>
<div class="app">
  <h1>00631L Pro</h1>
  <p class="sub">v4 Ultimate Pro｜單一 HTML｜GitHub Pages + Firebase</p>

  <section class="card hero">
    <div class="label">💰 真實總資產</div>
    <div class="main" id="heroTotal">-</div>
    <div class="gain" id="todayGain">今日損益：以手動價估算</div>
    <div class="grid3" style="margin-top:14px;text-align:left">
      <div class="kpi"><div class="label">淨資產</div><div class="value" id="netAssets">-</div><div class="hint">總資產 - 借款</div></div>
      <div class="kpi"><div class="label">Beta</div><div class="value" id="realBeta">-</div><div class="hint" id="riskType">-</div></div>
      <div class="kpi"><div class="label">借款</div><div class="value" id="loanView">-</div><div class="hint" id="loanHint">-</div></div>
    </div>
  </section>

  <section class="card ai">
    <div class="title">🤖 AI 配置建議 <span class="pill" id="syncMini">未連線</span></div>
    <p id="aiAdvice">正在分析配置...</p>
  </section>

  <section class="card">
    <div class="title">📊 持股與配置 <button class="btn secondary" onclick="refreshAll()">🔄 更新全部</button></div>
    <div id="assetList"></div>
    <div class="bar" id="allocBar"></div>
    <div class="legend" id="allocLegend"></div>
    <div class="warn" id="quoteWarn" style="display:none;margin-top:12px"></div>
  </section>

  <section class="card">
    <div class="title">🎯 目標偏離 <span class="pill">再平衡參考</span></div>
    <div class="grid2" id="driftCards"></div>
  </section>

  <section class="card">
    <div class="title">📉 風險壓力測試</div>
    <div class="grid3" id="lossCards"></div>
  </section>

  <section class="card">
    <div class="title">📈 十年模擬</div>
    <canvas id="chart"></canvas>
    <div class="grid3" id="resultCards" style="margin-top:10px"></div>
  </section>

  <details>
    <summary>📝 編輯持股資料 <span class="pill">展開</span></summary>
    <div class="inside" id="editAssets"></div>
  </details>

  <details>
    <summary>☁️ Firebase 雲端設定 <span class="pill" id="cloudStatus">未連線</span></summary>
    <div class="inside">
      <div class="grid2">
        <div><label>Firebase 資料庫網址</label><input id="fbUrl" type="text" placeholder="https://xxx.firebaseio.com/" onblur="saveSyncConfig()"></div>
        <div><label>自訂個人密鑰</label><input id="fbKey" type="password" placeholder="任意密碼" onblur="saveSyncConfig()"></div>
      </div>
      <button class="btn" style="width:100%;margin-top:10px" onclick="loadFromCloud()">連線同步</button>
      <p class="footer" id="storageMsg">平常可收合，資料會自動同步。</p>
    </div>
  </details>

  <details>
    <summary>🏦 借款 / 加碼 / 模擬參數 <span class="pill">進階</span></summary>
    <div class="inside">
      <div class="grid2">
        <div><label>現金（萬元）</label><input id="cash" type="number" value="200" oninput="updateAndSync()"></div>
        <div><label>借款金額（萬元）</label><input id="loanAmount" type="number" value="155" oninput="updateAndSync()"></div>
        <div><label>年利率（%）</label><input id="loanRate" type="number" step="0.01" value="4.23" oninput="updateAndSync()"></div>
        <div><label>貸款總期數（月）</label><input id="loanTotalMonths" type="number" value="60" oninput="updateAndSync()"></div>
        <div><label>00631L 年化 %</label><input id="rate631" type="number" value="14" oninput="updateAndSync()"></div>
        <div><label>0050 年化 %</label><input id="rate50" type="number" value="9" oninput="updateAndSync()"></div>
        <div><label>00865B 年化 %</label><input id="rateBond" type="number" value="4.5" oninput="updateAndSync()"></div>
        <div><label>00631L 目標 %</label><input id="pct631" type="number" value="40" oninput="updateAndSync()"></div>
        <div><label>0050 目標 %</label><input id="pct50" type="number" value="20" oninput="updateAndSync()"></div>
        <div><label>00865B 目標 %</label><input id="pctBond" type="number" value="20" oninput="updateAndSync()"></div>
        <div><label>加碼金額（萬元）</label><input id="addOnAmt" type="number" value="50" oninput="updateAndSync()"></div>
        <div><label>加碼發生第幾年</label><input id="addOnYear" type="number" value="2" oninput="updateAndSync()"></div>
      </div>
    </div>
  </details>

  <p class="footer">僅供資產管理與情境試算，不代表投資建議。</p>
</div>

<script>
const CONF_KEY='v4-conf', STATE_KEY='v4-state';
let syncTimer=null,isCloudSyncing=false;
let prices={p631:40.2,p50:150,pBond:48.15}, status={p631:'手動價',p50:'手動價',pBond:'手動價'};
const assets=[
 {key:'p631',name:'00631L',shares:'shares631',price:'price631',ticker:'00631L.TW',beta:1.9,target:'pct631',color:'#4fc3f7'},
 {key:'p50',name:'0050',shares:'shares50',price:'price50',ticker:'0050.TW',beta:1.0,target:'pct50',color:'#8ea0ff'},
 {key:'pBond',name:'00865B',shares:'sharesBond',price:'priceBond',ticker:'00865B.TW',beta:.05,target:'pctBond',color:'#91e7a7'}
];
function g(id){return document.getElementById(id)}
function n(id){return parseFloat(g(id)?.value)||0}
function fmt(v){const a=Math.abs(v);if(a>=1e8)return (v/1e8).toFixed(2)+'億';if(a>=1e7)return (v/1e7).toFixed(2)+'千萬';if(a>=1e6)return (v/1e6).toFixed(2)+'百萬';return (v/1e4).toFixed(1)+'萬'}
function pct(v){return (v||0).toFixed(1)+'%'}
function normalizeUrl(u){u=(u||'').trim();return u&&!u.endsWith('/')?u+'/':u}
async function hashKey(s){const d=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32)}
function saveLocal(){try{localStorage.setItem(STATE_KEY,JSON.stringify(getSettings()))}catch(e){}}
function initInputs(){
 let a=g('editAssets');a.innerHTML='';
 assets.forEach(x=>{
  a.innerHTML+=`<div class="grid2" style="margin-bottom:10px">
   <div><label>${x.name} 持股數</label><input id="${x.shares}" type="number" value="${x.key==='p631'?72000:x.key==='p50'?5000:9000}" oninput="updateAndSync()"></div>
   <div><label>${x.name} 股價</label><input id="${x.price}" type="number" step="0.01" value="${prices[x.key]}" oninput="manualPrice('${x.key}','${x.price}')"></div>
  </div>`;
 });
}
function manualPrice(k,id){let v=parseFloat(g(id).value);if(v>0){prices[k]=v;status[k]='手動價'}updateAndSync()}
async function fetchQuote(ticker){
 for(const host of ['query1.finance.yahoo.com','query2.finance.yahoo.com']){
  try{let r=await fetch(`https://${host}/v8/finance/chart/${ticker}`,{cache:'no-store'});if(!r.ok)continue;let j=await r.json();let p=j?.chart?.result?.[0]?.meta?.regularMarketPrice;if(p&&isFinite(p))return p}catch(e){}
 }
 throw new Error('quote failed')
}
async function refreshOne(k){
 let a=assets.find(x=>x.key===k);status[k]='更新中';update();
 try{let p=await fetchQuote(a.ticker);prices[k]=p;if(g(a.price))g(a.price).value=p;status[k]='已更新 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}
 catch(e){status[k]='更新失敗'}
 updateAndSync()
}
async function refreshAll(){await Promise.allSettled(assets.map(a=>refreshOne(a.key)))}
function calc(){
 let vals={},stock=0,beta=0;
 assets.forEach(a=>{vals[a.key]=n(a.shares)*prices[a.key];stock+=vals[a.key]});
 let cash=n('cash')*10000,loan=n('loanAmount')*10000,total=stock+cash,net=total-loan;
 assets.forEach(a=>{if(total)beta+=vals[a.key]/total*a.beta});
 return {vals,cash,loan,total,net,beta};
}
function update(){
 let c=calc();
 g('heroTotal').textContent=fmt(c.total);g('netAssets').textContent=fmt(c.net);g('loanView').textContent=fmt(c.loan);
 g('loanHint').textContent=`${n('loanRate')}%｜${n('loanTotalMonths')} 期`;
 g('realBeta').textContent=c.beta.toFixed(2);g('riskType').textContent=c.beta>1.35?'積極偏高':c.beta>.85?'穩健型':'保守型';
 renderAssets(c);renderBar(c);renderDrift(c);renderLoss(c);renderChart(makeData(c.total),c.total);renderResults(makeData(c.total),c.total);renderAI(c);
 let fails=assets.filter(a=>status[a.key].includes('失敗')).map(a=>a.name);
 g('quoteWarn').style.display=fails.length?'block':'none';g('quoteWarn').textContent=fails.length?`⚠️ ${fails.join('、')} 股價更新失敗，已使用目前手動價格。`:'';
}
function renderAssets(c){
 g('assetList').innerHTML='';
 assets.forEach(a=>{
  let v=c.vals[a.key], p=c.total?v/c.total*100:0;
  g('assetList').innerHTML+=`<div class="asset">
   <div class="badge" style="background:${a.color}">${a.name.replace('00631L','631L').replace('00865B','865B')}</div>
   <div><div class="name">${a.name}</div><div class="meta">${Math.round(n(a.shares)).toLocaleString()} 股｜${prices[a.key].toFixed(2)} 元｜<span class="${status[a.key].includes('失敗')?'status fail':'status'}">${status[a.key]}</span></div></div>
   <div><div class="amt">${fmt(v)}</div><div class="pct">${p.toFixed(1)}%</div></div>
  </div>`
 });
}
function renderBar(c){
 const arr=[['631L',c.vals.p631,'#4fc3f7'],['0050',c.vals.p50,'#8ea0ff'],['865B',c.vals.pBond,'#91e7a7'],['現金',c.cash,'#ffd54f']];
 g('allocBar').innerHTML=arr.map(x=>`<div style="flex:${c.total?x[1]/c.total*100:0};background:${x[2]}"></div>`).join('');
 g('allocLegend').innerHTML=arr.map(x=>`<span><i class="dot" style="background:${x[2]}"></i>${x[0]} ${c.total?(x[1]/c.total*100).toFixed(1):0}%</span>`).join('');
}
function renderDrift(c){
 const targetCash=Math.max(0,100-n('pct631')-n('pct50')-n('pctBond'));
 const rows=[['00631L',c.vals.p631,n('pct631'),'#4fc3f7'],['0050',c.vals.p50,n('pct50'),'#8ea0ff'],['00865B',c.vals.pBond,n('pctBond'),'#91e7a7'],['現金',c.cash,targetCash,'#ffd54f']];
 g('driftCards').innerHTML=rows.map(r=>{let now=c.total?r[1]/c.total*100:0,d=now-r[2];return `<div class="kpi"><div class="label">${r[0]}</div><div class="value" style="font-size:20px;color:${Math.abs(d)>8?'var(--yellow)':r[3]}">${d>=0?'+':''}${d.toFixed(1)}%</div><div class="hint">目前 ${now.toFixed(1)}%｜目標 ${r[2]}%</div></div>`}).join('');
}
function renderLoss(c){
 g('lossCards').innerHTML=[20,30,50].map(d=>{let loss=c.vals.p631*d/100*1.9+c.vals.p50*d/100+c.vals.pBond*d/100*.05;return `<div class="kpi"><div class="label">大盤跌 -${d}%</div><div class="value" style="font-size:19px;color:var(--red)">-${fmt(loss)}</div><div class="hint">約 -${c.total?(loss/c.total*100).toFixed(1):0}%</div></div>`}).join('');
}
function renderAI(c){
 let p631=c.total?c.vals.p631/c.total*100:0,cashP=c.total?c.cash/c.total*100:0;
 let text=[];
 if(c.beta>1.25) text.push('目前 Beta 偏高，代表大盤下跌時波動會比較明顯，建議保留現金或債券部位。');
 else text.push('目前 Beta 約 '+c.beta.toFixed(2)+'，整體屬於可控的穩健配置。');
 if(p631>n('pct631')+6) text.push('00631L 已高於目標配置約 '+(p631-n('pct631')).toFixed(1)+'%，短期可暫停加碼，等待回落或再平衡。');
 if(cashP>25) text.push('現金比例 '+cashP.toFixed(1)+'%，有足夠防禦資金，可保留作為大跌加碼彈藥。');
 g('aiAdvice').textContent=text.join(' ');
}
function makeData(total){
 let p631=n('pct631'),p50=n('pct50'),pBond=n('pctBond'),pCash=Math.max(0,100-p631-p50-pBond);
 let init={p631:total*p631/100,p50:total*p50/100,pBond:total*pBond/100,cash:total*pCash/100};
 let r631=n('rate631')/100,r50=n('rate50')/100,rBond=n('rateBond')/100,add=n('addOnAmt')*10000,ay=n('addOnYear');
 let out=[];for(let i=0;i<=10;i++){let v631=init.p631*(1+r631)**i,v50=init.p50*(1+r50)**i,vBond=init.pBond*(1+rBond)**i,vCash=init.cash,vAdd=i>=ay?add*(1+r631)**(i-ay):0;out.push({i,v631,v50,vBond,vCash,vAdd,total:v631+v50+vBond+vCash+vAdd})}return out
}
function renderChart(data,cost){
 let canvas=g('chart'),dpr=devicePixelRatio||1,W=canvas.clientWidth,H=260;canvas.width=W*dpr;canvas.height=H*dpr;let ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
 let pad={l:58,r:10,t:16,b:28},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b,max=Math.max(...data.map(d=>d.total))*1.08||1;let x=i=>pad.l+i*cw/10,y=v=>pad.t+ch*(1-v/max);
 ctx.strokeStyle='rgba(255,255,255,.10)';ctx.fillStyle='#8ca0b3';ctx.font='10px -apple-system';
 for(let i=0;i<=4;i++){let yy=pad.t+i*ch/4,val=max*(1-i/4);ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke();ctx.textAlign='right';ctx.fillText(fmt(val),pad.l-7,yy+3)}
 let layers=[['vCash','#ffd54f'],['vBond','#91e7a7'],['v50','#8ea0ff'],['vAdd','#ffb74d'],['v631','#4fc3f7']],bottom=data.map(_=>0);
 layers.forEach(([k,col])=>{ctx.beginPath();data.forEach((d,i)=>{let top=bottom[i]+d[k];i?ctx.lineTo(x(i),y(top)):ctx.moveTo(x(i),y(top))});for(let i=data.length-1;i>=0;i--)ctx.lineTo(x(i),y(bottom[i]));ctx.closePath();ctx.fillStyle=col+'55';ctx.fill();bottom=bottom.map((b,i)=>b+data[i][k])});
 ctx.strokeStyle='rgba(255,138,128,.9)';ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(x(0),y(cost));ctx.lineTo(x(10),y(cost));ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#8ca0b3';ctx.textAlign='center';for(let i=0;i<=10;i+=2)ctx.fillText(i+'年',x(i),H-8)
}
function renderResults(data,cost){
 let five=data[5].total,ten=data[10].total,cagr=Math.pow(ten/cost,1/10)-1;
 g('resultCards').innerHTML=[['5年',fmt(five),'+'+fmt(five-cost),'#4fc3f7'],['10年',fmt(ten),'+'+fmt(ten-cost),'#ce93d8'],['CAGR',isFinite(cagr)?(cagr*100).toFixed(1)+'%':'-','年化估算','#91e7a7']].map(x=>`<div class="kpi"><div class="label">${x[0]}</div><div class="value" style="font-size:20px;color:${x[3]}">${x[1]}</div><div class="hint">${x[2]}</div></div>`).join('');
}
function getSettings(){return {prices,status,shares631:n('shares631'),shares50:n('shares50'),sharesBond:n('sharesBond'),cash:n('cash'),loanAmount:n('loanAmount'),loanRate:n('loanRate'),loanTotalMonths:n('loanTotalMonths'),rate631:n('rate631'),rate50:n('rate50'),rateBond:n('rateBond'),pct631:n('pct631'),pct50:n('pct50'),pctBond:n('pctBond'),addOnAmt:n('addOnAmt'),addOnYear:n('addOnYear')}}
function applySettings(s){if(!s)return;isCloudSyncing=true;if(s.prices)prices={...prices,...s.prices};if(s.status)status={...status,...s.status};Object.keys(s).forEach(k=>{if(g(k)&&typeof s[k]!=='object')g(k).value=s[k]});assets.forEach(a=>{if(g(a.price))g(a.price).value=prices[a.key]});isCloudSyncing=false;update()}
function saveSyncConfig(){let conf={url:normalizeUrl(g('fbUrl').value),key:g('fbKey').value.trim()};g('fbUrl').value=conf.url;try{localStorage.setItem(CONF_KEY,JSON.stringify(conf))}catch(e){}}
async function syncToCloud(){if(isCloudSyncing)return;let conf=JSON.parse(localStorage.getItem(CONF_KEY)||'{}');if(!conf.url||!conf.key)return;try{let path=await hashKey(conf.key);g('cloudStatus').textContent='同步中';g('syncMini').textContent='同步中';await fetch(normalizeUrl(conf.url)+path+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(getSettings())});g('cloudStatus').textContent='✅ 已同步';g('syncMini').textContent='☁ 已同步'}catch(e){g('cloudStatus').textContent='❌ 失敗';g('syncMini').textContent='☁ 同步失敗'}}
function updateAndSync(){update();saveLocal();clearTimeout(syncTimer);syncTimer=setTimeout(syncToCloud,900)}
async function loadFromCloud(){saveSyncConfig();let conf=JSON.parse(localStorage.getItem(CONF_KEY)||'{}');if(!conf.url||!conf.key){alert('請輸入 Firebase 網址與密鑰');return}try{let path=await hashKey(conf.key);g('cloudStatus').textContent='下載中';let r=await fetch(normalizeUrl(conf.url)+path+'.json');let d=await r.json();if(d)applySettings(d);else updateAndSync();g('cloudStatus').textContent='✅ 已連線';g('syncMini').textContent='☁ 已同步'}catch(e){g('cloudStatus').textContent='❌ 連線失敗'}}
function init(){initInputs();let conf=JSON.parse(localStorage.getItem(CONF_KEY)||'{}');if(conf.url)g('fbUrl').value=conf.url;if(conf.key)g('fbKey').value=conf.key;try{let s=JSON.parse(localStorage.getItem(STATE_KEY)||'null');if(s)applySettings(s)}catch(e){}update();if(conf.url&&conf.key)loadFromCloud();setTimeout(refreshAll,800)}
window.addEventListener('resize',update);init();
</script>
